<svg viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg" class="anatomy-svg">
  <defs>
    <linearGradient id="respBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0c1a4a" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="respGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Body outline (subtle) -->
  <path d="M200 40 Q110 60 100 200 Q90 340 200 420 Q310 340 300 200 Q290 60 200 40 Z"
        fill="none" stroke="#334155" stroke-width="1" opacity="0.4"/>

  <!-- Nose/sinuses -->
  <g id="nose" class="anatomy-region">
    <ellipse cx="200" cy="70" rx="14" ry="18" fill="url(#respBase)" stroke="#60a5fa" stroke-width="1.5"/>
    <path d="M193 65 Q200 58 207 65" stroke="#60a5fa" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Throat/trachea (upper airway) -->
  <g id="throat" class="anatomy-region">
    <rect x="192" y="92" width="16" height="60" rx="4" fill="url(#respBase)" stroke="#60a5fa" stroke-width="1.8"/>
    <line x1="196" y1="105" x2="204" y2="105" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
    <line x1="196" y1="115" x2="204" y2="115" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
    <line x1="196" y1="125" x2="204" y2="125" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
    <line x1="196" y1="135" x2="204" y2="135" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
    <line x1="196" y1="145" x2="204" y2="145" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
  </g>

  <!-- Bronchi (branching tubes) -->
  <g id="bronchi" class="anatomy-region">
    <path d="M200 152 Q160 170 130 200" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M200 152 Q240 170 270 200" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M140 195 Q122 210 115 225" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M260 195 Q278 210 285 225" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Chest area marker -->
  <g id="chest" class="anatomy-region" opacity="0">
    <rect x="105" y="200" width="190" height="140" rx="20" fill="none"/>
  </g>

  <!-- Left lung -->
  <g id="left-lung" class="anatomy-region">
    <path d="M130 200 Q90 210 85 260 Q80 320 95 360 Q110 380 140 375 Q165 370 170 340 Q175 290 165 240 Q158 210 130 200 Z"
          fill="url(#respBase)" stroke="#60a5fa" stroke-width="2"/>
    <!-- Alveoli hints -->
    <circle cx="115" cy="250" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="130" cy="280" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="110" cy="310" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="140" cy="330" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="125" cy="350" r="3" fill="#60a5fa" opacity="0.5"/>
    <!-- Internal lines -->
    <path d="M120 230 Q115 280 125 340" stroke="#1e40af" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M145 240 Q140 290 150 350" stroke="#1e40af" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Right lung -->
  <g id="right-lung" class="anatomy-region">
    <path d="M270 200 Q310 210 315 260 Q320 320 305 360 Q290 380 260 375 Q235 370 230 340 Q225 290 235 240 Q242 210 270 200 Z"
          fill="url(#respBase)" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="285" cy="250" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="270" cy="280" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="290" cy="310" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="260" cy="330" r="3" fill="#60a5fa" opacity="0.5"/>
    <circle cx="275" cy="350" r="3" fill="#60a5fa" opacity="0.5"/>
    <path d="M280 230 Q285 280 275 340" stroke="#1e40af" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M255 240 Q260 290 250 350" stroke="#1e40af" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Labels -->
  <text x="65" y="275" font-size="11" fill="#94a3b8" font-family="Inter, sans-serif">Left lung</text>
  <text x="315" y="275" font-size="11" fill="#94a3b8" font-family="Inter, sans-serif">Right lung</text>
  <text x="200" y="86" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="Inter, sans-serif">Nose</text>
  <text x="230" y="130" font-size="10" fill="#94a3b8" font-family="Inter, sans-serif">Trachea</text>
</svg>
