<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Medical Diagnosis Expert System{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 L12 22 M2 12 L22 12" />
          <circle cx="12" cy="12" r="9" />
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">Medivo ES</div>
        <div class="brand-subtitle">Medical Diagnosis Expert System</div>
      </div>
    </a>
    <div class="nav-meta">
      <span class="nav-chip">AIE212</span>
      <span class="nav-chip">AIU · Phase 4</span>
    </div>
  </div>
</nav>

<main class="main-container">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div>Alamein International University · Faculty of Computer Science &amp; Engineering</div>
  <div class="footer-dim">Knowledge-Based Systems (AIE212) · Spring 2025/2026 · Dr. Essam Abdellatef</div>
</footer>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
